server:
 port: 8070

spring:
 application:
    name: "eurekaserver"
  config:
    import: optional:configserver:http://configserver:8071/

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://eurekaserver:8070/eureka/


management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

    
